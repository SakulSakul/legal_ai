name: NEXUS Keep-alive

on:
  schedule:
    - cron: "0 */6 * * *"   # 6시간마다
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r nexus_ai/requirements.txt
      - run: python -m nexus_ai.scripts.keepalive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
